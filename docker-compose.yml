services:
  backend:
    build:
      context: ./MoneyDetector-main
      dockerfile: Dockerfile
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu121
    restart: unless-stopped
    gpus: all
    ports:
      - "8000:8000"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: "5430"
      DB_NAME: practice
      DB_USER: postgres
      DB_PASSWORD: u3%9Rfq54J;<bG_-
      REDIS_URL: redis://host.docker.internal:6379/0
      OBJECT_SEG_API_URL: http://host.docker.internal:8010
      OBJECT_SEG_TIMEOUT_SECONDS: "180"
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      CELERY_LOG_LEVEL: info
      CELERY_POOL: solo
      CELERY_CONCURRENCY: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./MoneyDetector-main/FastAPI/uploads:/app/FastAPI/uploads
      - ./MoneyDetector-main/FastAPI/results:/app/FastAPI/results
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./MoneyDetector-main/web/detector
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_BASE: http://backend:8000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy

  telegram-bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    container_name: coin_detector_telegram_bot
    restart: unless-stopped
    env_file:
      - ./telegram_bot/.env
    environment:
      BACKEND_BASE_URL: http://backend:8000
    volumes:
      - ./telegram_bot/data:/data
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
