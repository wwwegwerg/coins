services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coin_detector_telegram_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
