services:
  telegram-bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    container_name: coin_detector_telegram_bot
    restart: unless-stopped
    env_file:
      - ./telegram_bot/.env
    volumes:
      - ./telegram_bot/data:/data
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
